server.port=8001

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/authdb
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:superSecretKey1234567890123456789012345}
jwt.expiration=86400000

# Log Service
log.service.url=${LOG_SERVICE_URL:http://log-service:8006}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.microservices=INFO
logging.level.org.springframework.security=WARN
